<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aniwa | Digital Marketing</title>
    <meta
      name="description"
      content="Digital marketing, web development and strategies that grow your business. Contact us to triple your sales." />
    <meta
      property="og:image"
      content="https://www.beaniwa.com/assets/img/opengraph.webp" />
    <link rel="canonical" href="https://www.beaniwa.com/" />
    <link rel="alternate" hreflang="es" href="https://www.beaniwa.com/es/" />
    <link rel="alternate" hreflang="en" href="https://www.beaniwa.com/en/" />

    <script>
      // Language detection and redirect
      (function () {
        var userLang = navigator.language || navigator.userLanguage;
        var lang = userLang.split("-")[0];

        // Check if user prefers Spanish
        if (lang === "es") {
          window.location.href = "/es/";
        } else {
          window.location.href = "/en/";
        }
      })();
    </script>
  </head>
  <body>
    <p>
      Redirecting to
      <a id="redirect-link" href="/en/">your language version</a>...
    </p>
    <script>
      // Fallback link in case JavaScript doesn't redirect
      (function () {
        var userLang = navigator.language || navigator.userLanguage;
        var lang = userLang.split("-")[0];
        var link = document.getElementById("redirect-link");

        if (lang === "es") {
          link.href = "/es/";
        } else {
          link.href = "/en/";
        }
      })();
    </script>
  </body>
</html>
