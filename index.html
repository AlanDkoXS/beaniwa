<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aniwa | Digital Marketing</title>
    <meta
      name="description"
      content="Digital marketing, web development and strategies that grow your business. Contact us to triple your sales." />
    <meta
      property="og:image"
      content="https://beaniwa.com/assets/img/opengraph.jpg" />
    <link rel="canonical" href="https://beaniwa.com/" />
    <link rel="alternate" hreflang="es" href="https://beaniwa.com/es/" />
    <link rel="alternate" hreflang="en" href="https://beaniwa.com/en/" />
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
    <link rel="apple-touch-icon" href="assets/img/favicon_apple.png" />
    <meta http-equiv="refresh" content="0; url=/en/" />
    <script>
      // Fallback redirect
      (function () {
        var userLang = navigator.language || navigator.userLanguage;
        if (userLang.split("-")[0] === "es") {
          window.location.replace("/es/");
        } else {
          window.location.replace("/en/");
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/en/">your language version</a>...</p>
  </body>
</html>
